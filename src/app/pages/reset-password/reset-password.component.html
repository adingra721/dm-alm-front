<main class="auth-page">
  <section class="auth-card">
    <div class="auth-brand">
      <img src="/images/cima-alm-logo.png" alt="CIMA ALM">
      <span>Gestion securisee</span>
      <h1>Nouveau mot de passe</h1>
      <p>Validez le token et choisissez un nouveau mot de passe.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <h2>Réinitialiser</h2>
      <p>Le mot de passe doit contenir au moins 10 caractères.</p>

      <label>
        <span>Token</span>
        <span class="input-field">
          <i class="fa fa-key" aria-hidden="true"></i>
          <input type="text" formControlName="token" autocomplete="one-time-code">
        </span>
      </label>

      <label>
        <span>Nouveau mot de passe</span>
        <span class="input-field">
          <i class="fa fa-lock" aria-hidden="true"></i>
          <input type="password" formControlName="newPassword" autocomplete="new-password">
        </span>
      </label>

      <label>
        <span>Confirmer le mot de passe</span>
        <span class="input-field">
          <i class="fa fa-check-circle" aria-hidden="true"></i>
          <input type="password" formControlName="confirmPassword" autocomplete="new-password">
        </span>
      </label>

      <div class="auth-error" *ngIf="error">{{ error }}</div>
      <div class="reset-token" *ngIf="success">{{ success }}</div>

      <button type="submit" [disabled]="loading">{{ loading ? 'Validation...' : 'Changer le mot de passe' }}</button>
      <a routerLink="/login" class="secondary-link">Retour à la connexion</a>
    </form>
  </section>
</main>
