<section class="password-page">
  <form [formGroup]="form" (ngSubmit)="submit()" class="password-card">
    <div class="page-heading">
      <span>Securite</span>
      <h2>Modifier le mot de passe</h2>
      <p>Choisissez un mot de passe robuste pour proteger votre session CIMA ALM.</p>
    </div>

    <label>
      <span>Mot de passe actuel</span>
      <span class="input-field">
        <i class="fa fa-unlock-alt" aria-hidden="true"></i>
        <input type="password" formControlName="currentPassword" autocomplete="current-password">
      </span>
    </label>

    <label>
      <span>Nouveau mot de passe</span>
      <span class="input-field">
        <i class="fa fa-lock" aria-hidden="true"></i>
        <input type="password" formControlName="newPassword" autocomplete="new-password">
      </span>
    </label>

    <label>
      <span>Confirmer le mot de passe</span>
      <span class="input-field">
        <i class="fa fa-check-circle" aria-hidden="true"></i>
        <input type="password" formControlName="confirmPassword" autocomplete="new-password">
      </span>
    </label>

    <div class="form-error" *ngIf="error">{{ error }}</div>
    <div class="form-success" *ngIf="success">{{ success }}</div>

    <div class="form-actions">
      <button type="button" class="secondary" (click)="cancel()">Annuler</button>
      <button type="submit" [disabled]="loading">{{ loading ? 'Modification...' : 'Modifier' }}</button>
    </div>
  </form>
</section>
