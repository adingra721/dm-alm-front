<div class="shell" [class.sidebar-collapsed]="sidebarCollapsed">
  <app-sidebar [collapsed]="false" [attr.aria-hidden]="sidebarCollapsed" />
  <main class="main">
    <header class="app-header">
      <div class="topbar">
        <div class="topbar-title">
          <button
            type="button"
            class="menu-button"
            [attr.aria-expanded]="!sidebarCollapsed"
            aria-label="Reduire ou afficher le menu"
            (click)="toggleSidebar()"
          >
            <i class="fa fa-bars" aria-hidden="true"></i>
          </button>
          <h1>{{ pageTitle }}</h1>
        </div>

        <div class="topbar-actions" aria-label="Actions utilisateur">
          <button type="button" aria-label="Notifications">
            <i class="fa fa-bell-o" aria-hidden="true"></i>
          </button>
          <button type="button" aria-label="Taches">
            <i class="fa fa-list-ul" aria-hidden="true"></i>
          </button>
          <button type="button" aria-label="Messages">
            <i class="fa fa-envelope-open-o" aria-hidden="true"></i>
          </button>
          <span class="action-separator" aria-hidden="true"></span>
          <button type="button" aria-label="Theme">
            <i class="fa fa-sun-o" aria-hidden="true"></i>
          </button>
          <span class="action-separator" aria-hidden="true"></span>
          <div class="user-avatar" aria-label="Utilisateur SALA ALLIANZ">
            <span>SA</span>
            <i aria-hidden="true"></i>
          </div>
        </div>
      </div>

      <nav class="header-breadcrumb" aria-label="Fil d'Ariane">
        <a href="#">Home</a>
        <span aria-hidden="true">/</span>
        <span>{{ pageGroup }}</span>
        <span aria-hidden="true">/</span>
        <strong>{{ pageTitle }}</strong>
      </nav>
    </header>

    <section class="content">
      <router-outlet />
    </section>
  </main>
</div>
