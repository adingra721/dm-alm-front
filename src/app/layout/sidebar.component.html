<aside class="sidebar" [class.collapsed]="collapsed">
  <div class="brand">
    <img class="brand-logo" src="/images/cima-alm-logo.png" alt="CIMA ALM">
    <div class="brand-text">
      <strong>CIMA ALM</strong>
      <small>SALA ALLIANZ</small>
    </div>
  </div>

  <nav class="nav">
    <a
      class="dashboard-link"
      routerLink="/dashboard"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      [attr.title]="collapsed ? 'Dashboard' : null"
    >
      <i class="fa fa-dashboard menu-icon" aria-hidden="true"></i>
      <span>Dashboard</span>
    </a>

    <details
      *ngFor="let menu of menus; let firstMenu = first"
      class="settings-menu"
      [class.direct-menu]="menu.items.length"
      routerLinkActive="menu-active"
      #menuActive="routerLinkActive"
      [attr.open]="firstMenu ? '' : null"
    >
      <summary>
        <i [class]="menu.icon + ' menu-icon'" aria-hidden="true"></i>
        <span>{{ menu.title }}</span>
      </summary>

      <section *ngFor="let group of menu.groups; let firstGroup = first">
        <details
          class="nav-group"
          routerLinkActive="group-active"
          #groupActive="routerLinkActive"
          [attr.open]="firstGroup || groupActive.isActive ? '' : null"
        >
          <summary>
            <span class="group-title">
              <i [class]="group.icon + ' group-icon'" aria-hidden="true"></i>
              <span>{{ group.key }}</span>
            </span>
          </summary>
          <a
            *ngFor="let item of group.value"
            [routerLink]="['/parametrage', item.key]"
            routerLinkActive="active"
            [attr.title]="collapsed ? item.title : null"
          >
            <i class="fa fa-folder item-icon" aria-hidden="true"></i>
            <span>{{ item.title }}</span>
          </a>
        </details>
      </section>

      <section class="menu-links" *ngIf="menu.items.length">
        <a
          *ngFor="let item of menu.items"
          [routerLink]="['/parametrage', item.key]"
          routerLinkActive="active"
          [attr.title]="collapsed ? item.title : null"
        >
          <i class="fa fa-folder item-icon" aria-hidden="true"></i>
          <span>{{ item.title }}</span>
        </a>
      </section>
    </details>
  </nav>
</aside>
