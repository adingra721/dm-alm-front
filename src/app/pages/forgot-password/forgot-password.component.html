<main class="auth-page">
  <section class="auth-card">
    <div class="auth-brand">
      <img src="/images/cima-alm-logo.png" alt="CIMA ALM">
      <span>Gestion securisee</span>
      <h1>Mot de passe oublié</h1>
      <p>Renseignez votre email pour generer un token de reinitialisation.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <h2>Réinitialisation</h2>
      <p>Le token généré est affiché ici en attendant la configuration email.</p>

      <label>
        <span>Email</span>
        <span class="input-field">
          <i class="fa fa-envelope" aria-hidden="true"></i>
          <input type="email" formControlName="email" autocomplete="email">
        </span>
      </label>

      <div class="auth-error" *ngIf="error">{{ error }}</div>

      <div class="reset-token" *ngIf="resetToken">
        <span>Token de reset</span>
        <strong>{{ resetToken }}</strong>
        <a [routerLink]="['/reset-password']" [queryParams]="{ token: resetToken }">Utiliser ce token</a>
      </div>

      <button type="submit" [disabled]="loading">{{ loading ? 'Generation...' : 'Generer le token' }}</button>
      <a routerLink="/login" class="secondary-link">Retour à la connexion</a>
    </form>
  </section>
</main>
